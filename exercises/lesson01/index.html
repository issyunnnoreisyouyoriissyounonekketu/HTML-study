<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HTML基礎レッスン</title>
  </head>
  <body>
    <!-- Step 1: 見出しを書いてみよう -->
    <!doctype html>
    <html lang="ja">
      <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>HTML基礎レッスン</title>
      </head>
      <body>
        <h1>HTMLの基礎を学ぼう</h1>
      </body>
    </html>

    <!-- Step 2: ここに <h2> と <p> を追加しよう -->
    <body>
      <h1>自己紹介ページ</h1>

      <h2>はじめまして</h2>
      <p>私の名前は田中太郎です。Web制作の勉強をしています。</p>
      <p>趣味は読書とゲームです。</p>

      <h2>好きな食べ物</h2>
      <p>カレーライスが一番好きです。</p>
    </body>

    <!-- Step 3: ここに <ul> または <ol> のリストを追加しよう -->
    <h2>趣味リスト</h2>
    <ul>
      <li>読書</li>
      <li>ゲーム</li>
      <li>映画鑑賞</li>
    </ul>

    <!-- Step 4: ここに <a> リンクと <img> 画像を追加しよう -->
    <h2>リンク</h2>
    <p><a href="https://www.google.com">Googleを開く</a></p>

    <!-- Step 5: <div> でグループ化してみよう -->
    <div>
      <h2>プロフィール</h2>
      <p>田中太郎 / 20歳</p>
      <p>東京都在住</p>
    </div>

    <div>
      <h2>趣味</h2>
      <ul>
        <li>読書</li>
        <li>ゲーム</li>
      </ul>
    </div>
  </body>
</html>
